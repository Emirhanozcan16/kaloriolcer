<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#215B63">
    <title>KaloriÖlçer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Setup Screen -->
        <div id="setup-screen" class="screen">
            <div class="setup-header">
                <img src="icon.png" alt="Kalori Takip Logo" class="app-logo">
                <h1>KaloriÖlçer</h1>
                <p>Hedeflerine ulaşmaya başla</p>
            </div>
            
            <div class="form-group">
                <label for="calorie-goal">Günlük Kalori Hedefiniz</label>
                <input type="number" id="calorie-goal" placeholder="Örn: 2000" min="500" max="10000">
            </div>

            <div class="form-group">
                <label for="meal-count">Günde Kaç Öğün Yiyeceksiniz?</label>
                <div class="meal-options">
                    <button class="meal-btn" data-value="2">2 Öğün</button>
                    <button class="meal-btn" data-value="3">3 Öğün</button>
                    <button class="meal-btn" data-value="4">4 Öğün</button>
                    <button class="meal-btn" data-value="5">5 Öğün</button>
                </div>
            </div>

            <button id="start-btn" class="primary-btn" disabled>Başla</button>
        </div>

        <!-- Dashboard Screen -->
        <div id="dashboard-screen" class="screen hidden">
            <!-- Header -->
            <header class="dash-header">
                <div class="header-top">
                    <h2>Bugünün Özeti</h2>
                    <div>
                        <button id="install-btn" class="icon-btn hidden" title="Uygulamayı Yükle" style="display: inline-flex; margin-right: 8px;">⬇️</button>
                        <button id="reset-btn" class="icon-btn" title="Ayarları Sıfırla" style="display: inline-flex;">⚙️</button>
                    </div>
                </div>
                
                <div class="calorie-card">
                    <div class="calorie-circle">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg"
                            d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                            <path class="circle"
                            stroke-dasharray="0, 100"
                            id="calorie-progress"
                            d="M18 2.0845
                                a 15.9155 15.9155 0 0 1 0 31.831
                                a 15.9155 15.9155 0 0 1 0 -31.831"
                            />
                        </svg>
                        <div class="calorie-text">
                            <span id="remaining-cals">0</span>
                            <small>Kaldı</small>
                        </div>
                    </div>
                    <div class="calorie-details">
                        <div class="detail-item">
                            <span class="label">Alınan</span>
                            <span class="value" id="consumed-cals">0</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">Hedef</span>
                            <span class="value" id="goal-cals">0</span>
                        </div>
                    </div>
                </div>
            </header>

            <div class="scroll-content">
                <!-- Notifications -->
                <div id="notifications-container"></div>

                <!-- Meals Section -->
                <section class="meals-section">
                    <h3>Öğünler (<span id="meal-count-display">0</span> Öğün)</h3>
                    <div id="meals-list" class="meals-list">
                        <!-- Meals will be injected here -->
                    </div>
                </section>

                <!-- Statistics Section -->
                <section class="stats-section">
                    <h3>İstatistikler</h3>
                    
                    <div class="stat-card">
                        <h4>Haftalık Ortalama</h4>
                        <div class="chart-container">
                            <canvas id="weeklyChart"></canvas>
                        </div>
                    </div>

                    <div class="stat-card">
                        <h4>Aylık Ortalama</h4>
                        <div class="chart-container">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                    </div>
                </section>
            </div>
        </div>
        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Ayarlar</h3>
                    <button id="close-settings-btn" class="icon-btn" style="color: var(--c-dark-blue); background: rgba(18, 65, 112, 0.1);">✕</button>
                </div>
                
                <div class="form-group">
                    <label for="new-calorie-goal">Yeni Kalori Hedefi</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="new-calorie-goal" placeholder="Örn: 2000" min="500" max="10000">
                        <button id="save-new-goal-btn" class="primary-btn" style="width: auto; margin-top: 0; padding: 0 20px;">Kaydet</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Öğün Sayısını Değiştir</label>
                    <div class="meal-options">
                        <button class="setting-meal-btn" data-value="2">2 Öğün</button>
                        <button class="setting-meal-btn" data-value="3">3 Öğün</button>
                        <button class="setting-meal-btn" data-value="4">4 Öğün</button>
                        <button class="setting-meal-btn" data-value="5">5 Öğün</button>
                    </div>
                </div>
                
                <button id="hard-reset-btn" style="width: 100%; padding: 12px; background: transparent; color: var(--error-color); border: 1px solid var(--error-color); border-radius: var(--radius-md); font-weight: 600; cursor: pointer; margin-top: 16px;">Tüm Verileri Sıfırla</button>
            </div>
        </div>

        <!-- Food Search Modal -->
        <div id="food-search-modal" class="modal hidden">
            <div class="modal-content" style="height: 85%; padding-bottom: 24px; display: flex; flex-direction: column;">
                <div class="modal-header">
                    <h3>Yemek Ara</h3>
                    <button id="close-food-search-btn" class="icon-btn" style="color: var(--c-dark-blue); background: rgba(18, 65, 112, 0.1);">✕</button>
                </div>
                
                <div class="form-group" style="padding: 16px; margin-bottom: 16px;">
                    <input type="text" id="food-search-input" placeholder="Yemek veya gıda adı ara..." style="padding: 12px; font-size: 16px;">
                </div>

                <div id="food-search-results" class="scroll-content" style="padding: 0; padding-bottom: 20px; flex: 1;">
                    <!-- Results will appear here -->
                </div>

                <!-- Calculator Panel (Hidden by default) -->
                <div id="food-calc-panel" class="hidden" style="background: var(--c-gradient-1); border-radius: var(--radius-lg); padding: 16px; margin-top: 16px; box-shadow: var(--shadow-sm); border: 1px solid var(--c-main);">
                    <h4 id="selected-food-name" style="color: var(--c-dark-blue); margin-bottom: 8px;">-</h4>
                    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 12px;">100 gramı <span id="selected-food-kcal" style="font-weight: bold;">0</span> kcal. <span id="selected-food-hint" style="font-style: italic;"></span></p>
                    
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <div style="flex: 1; display: flex; align-items: center; background: white; border-radius: var(--radius-md); padding: 8px 12px; border: 1px solid rgba(0,0,0,0.1);">
                            <input type="number" id="food-gram-input" placeholder="Gramaj girin" style="border: none; width: 100%; outline: none; font-size: 18px; font-weight: bold; color: var(--c-dark-teal); background: transparent; padding: 0;">
                            <span style="color: var(--text-muted); font-weight: 500;">g</span>
                        </div>
                        <div style="font-size: 20px; font-weight: 800; color: var(--c-main); width: 80px; text-align: center;">
                            <span id="calculated-kcal-display">0</span> <small style="font-size: 12px; font-weight: normal;">kcal</small>
                        </div>
                    </div>
                    
                    <button id="add-calculated-food-btn" class="primary-btn" style="padding: 14px; font-size: 16px; margin-top: 16px;">Öğüne Ekle</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW error', err));
            });
        }
    </script>
</body>
</html>
